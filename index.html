<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>국장 스크리너</title>
</head>
<body>

<h2>📊 거래량 TOP10</h2>

<button onclick="loadKospi()">코스피</button>
<button onclick="loadKosdaq()">코스닥</button>

<pre id="result">데이터 없음</pre>

<script>
async function fetchData(market) {
  const res = await fetch('/api/kis-proxy', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      action: 'volumeRank',
      market: market
    })
  });

  return await res.json();
}

function render(data) {
  const list = data.output || [];
  let txt = '';

  list.slice(0, 10).forEach((s, i) => {
    txt += `${i+1}. ${s.hts_kor_isnm} | ${s.stck_prpr}원 | 거래량:${s.acml_vol}\n`;
  });

  document.getElementById('result').textContent = txt;
}

async function loadKospi() {
  const data = await fetchData('KOSPI');
  render(data);
}

async function loadKosdaq() {
  const data = await fetchData('KOSDAQ');
  render(data);
}
</script>

</body>
</html>
