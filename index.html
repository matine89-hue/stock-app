<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>국장 스크리너</title>
    <style>
        :root { --bg: #0d0f14; --bg2: #1a1e28; --blue: #4a9eff; --text: #e8eaf0; --border: #2d3343; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* 뷰 섹션 */
        .view { display: none; padding-bottom: 80px; }
        .view.active { display: block; }

        /* 하단 바 - 절대 안 뚫리게 최상단 고정 */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: var(--bg2); border-top: 2px solid var(--border); display: flex; z-index: 999999; }
        .nav-btn { flex: 1; border: none; background: none; color: #888; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .nav-btn.active { color: var(--blue); background: rgba(74, 158, 255, 0.1); }
        .nav-btn span { font-size: 12px; font-weight: bold; margin-top: 4px; }

        /* 공통 스타일 */
        .card { background: var(--bg2); margin: 10px; padding: 15px; border-radius: 10px; border: 1px solid var(--border); }
        input, textarea { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; margin-bottom: 10px; border-radius: 6px; box-sizing: border-box; }
        .main-btn { width: 100%; padding: 15px; background: var(--blue); color: #fff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        /* 상단 탭 */
        .top-tabs { display: flex; background: var(--bg2); padding: 10px; gap: 5px; }
        .t-tab { flex: 1; padding: 10px; text-align: center; background: #222; border-radius: 5px; font-size: 13px; }
        .t-tab.active { background: var(--blue); color: #fff; }
    </style>
</head>
<body>

    <div id="page-list" class="view active">
        <div style="padding: 15px; font-weight: bold; font-size: 18px;">📊 국장 스크리너</div>
        <div class="top-tabs">
            <div class="t-tab active" onclick="setMarket('KOSPI')">코스피</div>
            <div class="t-tab" onclick="setMarket('KOSDAQ')">코스닥</div>
            <div class="t-tab" onclick="setMarket('HISTORY')">기록</div>
        </div>
        <div id="stockList"></div>
    </div>

    <div id="page-set" class="view">
        <div style="padding: 15px; font-weight: bold; font-size: 18px;">⚙️ 설정 및 연결</div>
        <div class="card">
            <label style="font-size:12px; color:#888;">App Key</label>
            <input type="password" id="appKey">
            <label style="font-size:12px; color:#888;">App Secret</label>
            <input type="password" id="appSecret">
            <button class="main-btn" onclick="saveKeys()">설정 저장 및 토큰 발급</button>
            <p id="status" style="text-align:center; font-size:12px; margin-top:10px; color:#888;">상태: 대기 중</p>
        </div>
        <div style="padding: 0 10px;">
            <button class="main-btn" style="background:#333;" onclick="fetchStockData()">📡 실시간 데이터 새로고침</button>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn active" id="nb1" onclick="goPage('list')"><div>📊</div><span>스크리너</span></button>
        <button class="nav-btn" id="nb2" onclick="goPage('set')"><div>⚙️</div><span>설정</span></button>
    </div>

    <script>
        let stocks = [], currentM = 'KOSPI';
        let history = JSON.parse(localStorage.getItem('my_h') || '{}');

        // [핵심] 페이지 이동 함수 - 무조건 작동하게 설계
        function goPage(p) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            if(p === 'list') {
                document.getElementById('page-list').classList.add('active');
                document.getElementById('nb1').classList.add('active');
            } else {
                document.getElementById('page-set').classList.add('active');
                document.getElementById('nb2').classList.add('active');
            }
        }

        function setMarket(m) {
            currentM = m;
            document.querySelectorAll('.t-tab').forEach(t => {
                t.classList.toggle('active', t.innerText.includes(m === 'HISTORY' ? '기록' : m));
            });
            render();
        }

        async function saveKeys() {
            const k = document.getElementById('appKey').value, s = document.getElementById('appSecret').value;
            const st = document.getElementById('status');
            st.innerText = "토큰 발급 중...";
            try {
                const res = await fetch('/api/kis-proxy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'getToken', appkey: k, appsecret: s })
                });
                const d = await res.json();
                if(d.access_token) {
                    localStorage.setItem('k', k); localStorage.setItem('s', s); localStorage.setItem('t', d.access_token);
                    st.innerText = "✅ 연결 성공!";
                } else { st.innerText = "❌ 인증 실패 (키 확인)"; }
            } catch(e) { st.innerText = "❌ 서버 에러"; }
        }

        async function fetchStockData() {
            const t = localStorage.getItem('t'), k = localStorage.getItem('k'), s = localStorage.getItem('s');
            if(!t) return alert("연결부터 하세요.");
            try {
                const res = await fetch('/api/kis-proxy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'volumeRank', market: currentM==='HISTORY'?'KOSPI':currentM, token: t, appkey: k, appsecret: s })
                });
                const d = await res.json();
                const list = d.output || d.output1;
                if(list && Array.isArray(list)) {
                    stocks = list;
                    render();
                    goPage('list');
                    alert("업데이트 완료!");
                } else {
                    alert("한투 응답: " + (d.msg1 || "데이터 없음"));
                }
            } catch(e) { alert("통신 에러"); }
        }

        function render() {
            const cont = document.getElementById('stockList');
            cont.innerHTML = '';
            let data = currentM === 'HISTORY' ? stocks.filter(i => history[i.mksc_shrn_iscd]) : stocks;

            data.forEach(s => {
                const id = s.mksc_shrn_iscd, h = history[id] || {sc:'', mm:''};
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display==='block'?'none':'block'">
                        <div style="display:flex; justify-content:space-between;">
                            <b>${s.hts_kor_isnm}</b>
                            <span style="color:${s.prdy_ctrt>0?'#ff5c5c':'#4a9eff'}">${parseInt(s.stck_prpr).toLocaleString()}원</span>
                        </div>
                        <div style="font-size:12px; color:#888; margin-top:5px;">${id} | ${s.prdy_ctrt}%</div>
                    </div>
                    <div style="display:none; margin-top:10px; padding-top:10px; border-top:1px solid #333;">
                        <input type="number" id="sc-${id}" placeholder="점수" value="${h.sc}">
                        <textarea id="mm-${id}" placeholder="메모...">${h.mm}</textarea>
                        <button class="main-btn" style="padding:8px;" onclick="saveRec('${id}')">저장</button>
                    </div>
                `;
                cont.appendChild(div);
            });
        }

        function saveRec(id) {
            history[id] = { sc: document.getElementById(`sc-${id}`).value, mm: document.getElementById(`mm-${id}`).value };
            localStorage.setItem('my_h', JSON.stringify(history));
            alert('저장됨');
        }

        document.getElementById('appKey').value = localStorage.getItem('k') || '';
