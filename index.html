<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>국장 스크리너</title>
    <style>
        body { background:#0d0f14; color:#fff; font-family:sans-serif; margin:0; }
        /* 메뉴 상단 강제 고정 */
        .nav { display:flex; position:sticky; top:0; background:#222; z-index:9999; border-bottom:2px solid #4a9eff; }
        .nav div { flex:1; padding:20px; text-align:center; cursor:pointer; font-weight:bold; }
        .nav .active { background:#4a9eff; }
        .page { display:none; padding:20px; }
        .page.active { display:block; }
        .card { background:#1a1e28; padding:15px; border-radius:10px; margin-bottom:10px; border:1px solid #333; }
        input { width:100%; padding:15px; margin:10px 0; background:#000; color:#fff; border:1px solid #444; box-sizing:border-box; }
        button { width:100%; padding:15px; background:#4a9eff; color:#fff; border:none; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>
    <div class="nav">
        <div id="m-list" class="active" onclick="show('list')">📊 리스트</div>
        <div id="m-set" onclick="show('set')">⚙️ 설정</div>
    </div>

    <div id="p-list" class="page active">
        <div id="listCont" style="text-align:center; padding-top:50px; color:#555;">데이터를 새로고침 하세요.</div>
    </div>

    <div id="p-set" class="page">
        <div class="card">
            <input type="password" id="ak" placeholder="App Key">
            <input type="password" id="as" placeholder="App Secret">
            <button onclick="save()">저장 및 토큰발급</button>
            <p id="st" style="text-align:center; font-size:12px; margin-top:10px;">상태: 대기</p>
        </div>
        <button style="background:#333;" onclick="load()">🔄 실시간 데이터 새로고침</button>
    </div>

    <script>
        let stocks = [];
        function show(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav div').forEach(el => el.classList.remove('active'));
            document.getElementById('p-'+p).classList.add('active');
            document.getElementById('m-'+p).classList.add('active');
        }

        async function save() {
            const k = document.getElementById('ak').value, s = document.getElementById('as').value;
            document.getElementById('st').innerText = "연결 중...";
            const r = await fetch('/api/kis-proxy', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'getToken', appkey: k, appsecret: s })
            });
            const d = await r.json();
            if(d.access_token) {
                localStorage.setItem('k', k); localStorage.setItem('s', s); localStorage.setItem('t', d.access_token);
                document.getElementById('st').innerText = "✅ 연결 성공!";
            } else { alert("토큰 발급 실패: " + (d.msg1 || "키 확인 요망")); }
        }

        async function load() {
            const t = localStorage.getItem('t'), k = localStorage.getItem('k'), s = localStorage.getItem('s');
            if(!t) return alert("설정에서 토큰부터 받으세요.");
            try {
                const r = await fetch('/api/kis-proxy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'volumeRank', market: 'KOSPI', token: t, appkey: k, appsecret: s })
                });
                const d = await r.json();
                const list = d.output || d.output1;
                if(list && Array.isArray(list)) {
                    stocks = list; render(); show('list');
                } else {
                    // 한투가 보낸 에러 메시지를 직접 띄움
                    alert("한투 응답: " + (d.msg1 || "데이터가 비어있습니다."));
                }
            } catch(e) { alert("통신 에러"); }
        }

        function render() {
            const c = document.getElementById('listCont');
            c.innerHTML = stocks.map(s => `
                <div class="card">
                    <b>${s.hts_kor_isnm}</b><br>
                    <small>${s.stck_prpr}원 (${s.prdy_ctrt}%)</small>
                </div>
            `).join('');
        }

        document.getElementById('ak').value = localStorage.getItem('k') || '';
        document.getElementById('as').value = localStorage.getItem('s') || '';
    </script>
</body>
</html>
