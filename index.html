<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>국장 스크리너</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#111;
  color:#fff;
}

header {
  padding:10px;
  background:#1a1a1a;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container {
  padding:10px;
}

.section {
  margin-bottom:20px;
}

.card {
  background:#1c1c1c;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  cursor:pointer;
}

.score {
  float:right;
  font-weight:bold;
}

button {
  padding:10px;
  width:100%;
  margin-top:10px;
  background:#2c2c2c;
  color:white;
  border:none;
  border-radius:6px;
}
</style>
</head>

<body>

<header>
  <div>국장스크리너</div>
  <div>🔔</div>
</header>

<div class="container">

  <div class="section">
    <button onclick="loadData()">📡 실시간 데이터 불러오기</button>
  </div>

  <div class="section">
    <h3>📊 코스피</h3>
    <div id="kospi"></div>
  </div>

  <div class="section">
    <h3>📈 코스닥</h3>
    <div id="kosdaq"></div>
  </div>

</div>

<script>

// 🔐 저장된 키
let APP_KEY = localStorage.getItem('appkey') || '';
let APP_SECRET = localStorage.getItem('appsecret') || '';
let TOKEN = localStorage.getItem('token') || '';

async function getToken() {
  const res = await fetch('/api/kis-proxy', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      action:'getToken',
      appkey:APP_KEY,
      appsecret:APP_SECRET
    })
  });

  const data = await res.json();
  TOKEN = data.access_token;
  localStorage.setItem('token', TOKEN);
}

// 🔥 점수 계산 (자동)
function calcScore(item) {
  let score = 0;

  const rate = Number(item.prdy_ctrt || 0);
  const vol  = Number(item.acml_vol || 0);
  const diff = Number(item.prdy_vrss || 0);

  if (rate > 5) score += 2;
  if (vol > 1000000) score += 2;
  if (diff > 0) score += 1;

  return { ...item, score };
}

// 🔥 렌더
function renderList(elId, list) {
  const el = document.getElementById(elId);
  el.innerHTML = '';

  list.slice(0,20).forEach(item => {
    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      ${item.hts_kor_isnm || item.stck_shrn_iscd}
      <span class="score">${item.score}점</span>
    `;

    el.appendChild(div);
  });
}

// 🔥 핵심: 데이터 로드 + 자동 점수 계산
async function loadData() {

  if (!TOKEN) {
    await getToken();
  }

  try {

    // 코스피
    const kospiRes = await fetch('/api/kis-proxy', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        action:'volumeRank',
        market:'KOSPI',
        appkey:APP_KEY,
        appsecret:APP_SECRET,
        token:TOKEN
      })
    });

    // 코스닥
    const kosdaqRes = await fetch('/api/kis-proxy', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        action:'volumeRank',
        market:'KOSDAQ',
        appkey:APP_KEY,
        appsecret:APP_SECRET,
        token:TOKEN
      })
    });

    const kospiData = await kospiRes.json();
    const kosdaqData = await kosdaqRes.json();

    const kospiList = (kospiData.output || []).map(calcScore);
    const kosdaqList = (kosdaqData.output || []).map(calcScore);

    console.log('코스피:', kospiList.length);
    console.log('코스닥:', kosdaqList.length);

    renderList('kospi', kospiList);
    renderList('kosdaq', kosdaqList);

  } catch (e) {
    console.error(e);
    alert('데이터 불러오기 실패');
  }
}

</script>

</body>
</html>
