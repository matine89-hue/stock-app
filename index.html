<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>국장 스크리너</title>
    <style>
        :root { --bg: #0d0f14; --bg2: #1a1e28; --blue: #4a9eff; --text: #e8eaf0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 0; }
        
        /* [핵심] 메뉴를 화면 최상단에 고정 */
        .top-nav { display: flex; background: #222; border-bottom: 2px solid var(--blue); position: sticky; top: 0; z-index: 99999; }
        .nav-btn { flex: 1; padding: 20px; color: #fff; text-align: center; font-weight: bold; cursor: pointer; border: none; background: none; font-size: 16px; }
        .nav-btn.active { background: var(--blue); }

        .view { display: none; padding: 20px; }
        .view.active { display: block; }

        .card { background: var(--bg2); padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; }
        input { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 15px; margin: 10px 0; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: var(--blue); color: #fff; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; cursor: pointer; }
        
        .sub-tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .s-tab { flex: 1; padding: 10px; background: #333; text-align: center; border-radius: 5px; font-size: 13px; }
        .s-tab.active { background: #555; border: 1px solid var(--blue); }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="nav-btn active" id="btn-list" onclick="go('list')">📊 리스트</div>
        <div class="nav-btn" id="btn-set" onclick="go('set')">⚙️ 설정</div>
    </div>

    <div id="p-list" class="view active">
        <div class="sub-tabs">
            <div class="s-tab active" onclick="setM('KOSPI')">코스피</div>
            <div class="s-tab" onclick="setM('KOSDAQ')">코스닥</div>
            <div class="s-tab" onclick="setM('HISTORY')">기록</div>
        </div>
        <div id="stockList"></div>
    </div>

    <div id="p-set" class="view">
        <div class="card">
            <h3>API 연결</h3>
            <input type="password" id="ak" placeholder="App Key">
            <input type="password" id="as" placeholder="App Secret">
            <button class="btn" onclick="save()">저장 및 토큰발급</button>
            <p id="st" style="text-align:center; font-size:12px; color:#888; margin-top:10px;">상태: 대기</p>
        </div>
        <button class="btn" style="background:#444;" onclick="load()">🔄 데이터 새로고침</button>
    </div>

    <script>
        let stocks = [], market = 'KOSPI';
        let history = JSON.parse(localStorage.getItem('h_v1') || '{}');

        // 페이지 전환 (강제성 부여)
        function go(target) {
            console.log("페이지 이동:", target);
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            if(target === 'list') {
                document.getElementById('p-list').className = 'view active';
                document.getElementById('btn-list').className = 'nav-btn active';
            } else {
                document.getElementById('p-set').className = 'view active';
                document.getElementById('btn-set').className = 'nav-btn active';
            }
        }

        function setM(m) {
            market = m;
            document.querySelectorAll('.s-tab').forEach(t => t.classList.toggle('active', t.innerText.includes(m==='HISTORY'?'기록':m)));
            render();
        }

        async function save() {
            const k = document.getElementById('ak').value, s = document.getElementById('as').value;
            document.getElementById('st').innerText = "시도 중...";
            try {
                const r = await fetch('/api/kis-proxy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'getToken', appkey: k, appsecret: s })
                });
                const d = await r.json();
                if(d.access_token) {
                    localStorage.setItem('k', k); localStorage.setItem('s', s); localStorage.setItem('t', d.access_token);
                    document.getElementById('st').innerText = "✅ 연결 성공!";
                } else { document.getElementById('st').innerText = "❌ 실패: 키 확인"; }
            } catch(e) { alert("서버 에러"); }
        }

        async function load() {
            const t = localStorage.getItem('t'), k = localStorage.getItem('k'), s = localStorage.getItem('s');
            if(!t) return alert("설정부터 하세요.");
            try {
                const r = await fetch('/api/kis-proxy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'volumeRank', market: market==='HISTORY'?'KOSPI':market, token: t, appkey: k, appsecret: s })
                });
                const d = await r.json();
                const o = d.output || d.output1;
                if(o && Array.isArray(o)) {
                    stocks = o; render(); go('list'); alert("완료");
                } else { alert("데이터 없음: " + (d.msg1 || "확인불가")); }
            } catch(e) { alert("통신실패"); }
        }

        function render() {
            const c = document.getElementById('stockList');
            c.innerHTML = '';
            let d = market === 'HISTORY' ? stocks.filter(i => history[i.mksc_shrn_iscd]) : stocks;
            d.forEach(s => {
                const id = s.mksc_shrn_iscd, h = history[id] || {sc:'', mm:''};
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div onclick="const n=this.nextElementSibling; n.style.display=n.style.display==='block'?'none':'block'">
                        <div style="display:flex; justify-content:space-between;"><b>${s.hts_kor_isnm}</b><span>${parseInt(s.stck_prpr).toLocaleString()}원</span></div>
                        <div style="font-size:12px; color:#888;">${id} | ${s.prdy_ctrt}%</div>
                    </div>
                    <div style="display:none; margin-top:10px; border-top:1px solid #444; padding-top:10px;">
                        <input type="number" id="sc-${id}" placeholder="점수" value="${h.sc}">
                        <textarea id="mm-${id}" style="width:100%; background:#000; color:#fff; border:1px solid #444; padding:10px; border-radius:5px;">${h.mm}</textarea>
                        <button class="btn" style="padding:10px; margin-top:5px;" onclick="saveH('${id}')">저장</button>
                    </div>
                `;
                c.appendChild(card);
            });
        }

        function saveH(id) {
            history[id] = { sc: document.getElementById(`sc-${id}`).value, mm: document.getElementById(`mm-${id}`).value };
            localStorage.setItem('h_v1', JSON.stringify(history));
            alert('저장됨');
        }

        // 초기 세팅
        document.getElementById('ak').value = localStorage.getItem('k') || '';
        document.getElementById('as').value = localStorage.getItem('s') || '';
        render();
    </script>
</body>
</html>
