<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>국장 스크리너</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14; --bg2: #13161e; --bg3: #1a1e28; --bg4: #222636;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
  --text: #e8eaf0; --text2: #8b90a0; --text3: #555a6e;
  --blue: #4a9eff; --blue-dim: rgba(74,158,255,0.12);
  --green: #3dd68c; --green-dim: rgba(61,214,140,0.12);
  --red: #ff5c5c; --red-dim: rgba(255,92,92,0.12);
  --amber: #ffb84a; --amber-dim: rgba(255,184,74,0.12);
  --purple: #a78bfa; --purple-dim: rgba(167,139,250,0.12);
  --radius: 10px; --radius-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
.app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; position: relative; }
@media(min-width: 900px) { .app { max-width: 900px; } }

/* Header & UI Components */
.header { padding: 16px 16px 0; display: flex; align-items: center; justify-content: space-between; }
.logo { font-size: 18px; font-weight: 700; }
.logo span { color: var(--blue); }
.time-badge { font-size: 11px; color: var(--text2); background: var(--bg3); padding: 4px 10px; border-radius: 99px; border: 0.5px solid var(--border2); }
.market-bar { margin: 12px 16px 0; background: var(--bg3); border-radius: var(--radius); padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
.tabs-wrap { padding: 14px 16px 0; }
.tabs { display: flex; gap: 6px; background: var(--bg3); border-radius: var(--radius); padding: 4px; }
.tab { flex: 1; text-align: center; padding: 8px 4px; font-size: 13px; border-radius: 7px; cursor: pointer; color: var(--text2); }
.tab.active { background: var(--bg4); color: var(--text); }
.stock-list { padding: 10px 16px; flex: 1; }
.bottom-nav { position: sticky; bottom: 0; background: var(--bg2); border-top: 0.5px solid var(--border); display: flex; padding: 8px 0; }
.nav-item { flex: 1; text-align: center; cursor: pointer; color: var(--text3); }
.nav-item.active { color: var(--blue); }

/* Input Styles */
input { width: 100%; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); padding: 9px 12px; outline: none; margin-bottom: 8px; }
button { width: 100%; padding: 10px; border-radius: var(--radius-sm); cursor: pointer; font-weight: 500; border: none; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">국장<span>스크리너</span></div>
    <div class="time-badge" id="clock">--:--</div>
  </div>

  <div class="market-bar">
    <span style="font-size:11px;color:var(--text2)">● 장 마감 분석</span>
    <div style="font-size:11px;">KOSPI <span style="color:var(--red)">2,538</span> | KOSDAQ <span style="color:var(--green)">723</span></div>
  </div>

  <div class="tabs-wrap" id="mainTabs">
    <div class="tabs">
      <div class="tab active" onclick="switchTab(0)">📊 스크리너</div>
      <div class="tab" onclick="switchTab(1)">⭐ 관심</div>
      <div class="tab" onclick="switchTab(2)">⚙️ 설정</div>
    </div>
  </div>

  <div id="listView" class="stock-list">
    <div style="text-align:center; padding:40px; color:var(--text3);">설정에서 API 연결을 먼저 해주세요.</div>
  </div>

  <div id="settingsView" style="display:none; padding:16px;">
    <div style="background:var(--bg2); padding:16px; border-radius:var(--radius); border:0.5px solid var(--border);">
      <h4 style="margin-bottom:12px; font-size:14px;">KIS API 설정</h4>
      <input id="inputAppKey" type="password" placeholder="App Key 입력">
      <input id="inputAppSecret" type="password" placeholder="App Secret 입력">
      <button onclick="saveAndConnect()" style="background:var(--blue-dim); color:var(--blue); border:0.5px solid var(--blue);">저장 및 토큰 발급</button>
      <div id="apiStatusText" style="margin-top:10px; font-size:12px; color:var(--text3);">상태: 연결 대기 중</div>
    </div>
    
    <div style="margin-top:16px;">
      <button id="fetchBtn" onclick="fetchLiveData()" style="background:var(--green-dim); color:var(--green); border:0.5px solid var(--green);">📡 실시간 데이터 불러오기</button>
      <div id="fetchStatus" style="margin-top:8px; font-size:11px; color:var(--text3);"></div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active" onclick="switchTab(0)">📊<br>스크리너</div>
    <div class="nav-item" onclick="switchTab(1)">⭐<br>관심</div>
    <div class="nav-item" onclick="switchTab(2)">⚙️<br>설정</div>
  </div>
</div>

<script>
// ── 설정 및 전역 변수 ──────────────────────────────────
let KIS_APP_KEY = localStorage.getItem('kis_app_key') || '';
let KIS_APP_SECRET = localStorage.getItem('kis_app_secret') || '';
let KIS_ACCESS_TOKEN = localStorage.getItem('kis_access_token') || '';
const PROXY_URL = '/api/kis-proxy'; // Vercel 전용 경로

// ── 화면 전환 로직 ────────────────────────────────────
function switchTab(idx) {
  const list = document.getElementById('listView');
  const settings = document.getElementById('settingsView');
  const tabs = document.querySelectorAll('.tab');
  const navs = document.querySelectorAll('.nav-item');

  tabs.forEach((t, i) => t.classList.toggle('active', i === idx));
  navs.forEach((n, i) => n.classList.toggle('active', i === idx));

  if(idx === 2) {
    list.style.display = 'none';
    settings.style.display = 'block';
  } else {
    list.style.display = 'block';
    settings.style.display = 'none';
  }
}

// ── API 연결 로직 (수정본) ──────────────────────────────
async function saveAndConnect() {
  const key = document.getElementById('inputAppKey').value.trim();
  const sec = document.getElementById('inputAppSecret').value.trim();
  const statusEl = document.getElementById('apiStatusText');

  if (!key || !sec) {
    alert("키와 시크릿을 모두 입력하세요.");
    return;
  }

  // 전역 변수 및 로컬스토리지 저장
  KIS_APP_KEY = key;
  KIS_APP_SECRET = sec;
  localStorage.setItem('kis_app_key', key);
  localStorage.setItem('kis_app_secret', sec);

  statusEl.textContent = "🔄 토큰 발급 중...";
  
  try {
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'getToken', appkey: key, appsecret: sec })
    });

    const data = await res.json();

    if (data.access_token) {
      KIS_ACCESS_TOKEN = data.access_token;
      localStorage.setItem('kis_access_token', data.access_token);
      statusEl.textContent = "✅ 연결 성공!";
      statusEl.style.color = "var(--green)";
      alert("연결에 성공했습니다!");
    } else {
      statusEl.textContent = "❌ 실패: " + (data.msg1 || "정보 확인 필요");
      statusEl.style.color = "var(--red)";
    }
  } catch (e) {
    statusEl.textContent = "⚠️ 에러: " + e.message;
    alert("시스템 에러가 발생했습니다.");
  }
}

// 실시간 데이터 호출 (기본 구조)
async function fetchLiveData() {
  const status = document.getElementById('fetchStatus');
  if(!KIS_ACCESS_TOKEN) {
    alert("먼저 API 연결을 완료하세요.");
    return;
  }
  status.textContent = "📡 데이터를 가져오는 중...";
  // 여기에 거래량 순위 등 추가 로직 구현 가능
}

// 시계 업데이트
setInterval(() => {
  const now = new Date();
  document.getElementById('clock').textContent = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
}, 1000);
</script>
</body>
</html>
