<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>국장 스크리너</title>
<style>
body { background:#111; color:#eee; font-family:Arial; }
.card { padding:10px; border-bottom:1px solid #333; }
.up { color:red; }
.down { color:skyblue; }
.score { float:right; }
.market { font-size:12px; opacity:0.6; }
</style>
</head>
<body>

<button onclick="loadStocks()">불러오기</button>
<div id="list"></div>

<script>

// ✅ 점수 함수
function calculateScore(s){
  let score = 0;
  if(Number(s.prdy_ctrt) > 3) score++;
  if(Number(s.acml_vol) > 1000000) score++;
  if(Number(s.prdy_vrss) > 0) score++;
  return score;
}

// ✅ 로드
async function loadStocks(){

  const res = await fetch('/api/kis-proxy',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ action:'volumeRank' })
  });

  const data = await res.json();

  // 🔥 여기서 계산 끝내야 한다
  let list = (data.output || []).map(s => ({
    ...s,
    score: calculateScore(s)
  }));

  // 정렬
  list.sort((a,b)=>b.score-a.score);

  render(list);
}

// ✅ 렌더
function render(list){

  const el = document.getElementById('list');
  el.innerHTML = '';

  list.forEach(s=>{

    const div = document.createElement('div');
    div.className='card';

    const change = Number(s.prdy_ctrt);
    const cls = change>=0?'up':'down';

    div.innerHTML = `
      <b>${s.hts_kor_isnm}</b> 
      <span class="${cls}">${change}%</span>
      <span class="score">⭐${s.score}</span>
      <div class="market">${s.market}</div>
    `;

    // 🔴 클릭 이벤트 완전 제거 (중요)
    // div.onclick = ...

    el.appendChild(div);
  });
}

</script>

</body>
</html>
