<script>
let token = '';
let appkey = '';
let appsecret = '';

function calculateScore(stock) {
  let score = 0;

  if (stock.per && stock.per < 10) score++;
  if (stock.pbr && stock.pbr < 1) score++;
  if (stock.volume_ratio > 150) score++;
  if (stock.foreign_buy) score++;

  return score;
}

async function loadStocks(market) {
  const res = await fetch('/api/kis-proxy', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      action: 'volumeRank',
      market,
      token,
      appkey,
      appsecret
    })
  });

  const data = await res.json();
  console.log('API응답:', data);

  const list = data.output || [];

  const mapped = list.map(s => ({
    code: s.mksc_shrn_iscd,
    name: s.hts_kor_isnm,
    price: Number(s.stck_prpr),
    volume: Number(s.acml_vol),
    per: Number(s.per),
    pbr: Number(s.pbr),
    volume_ratio: Number(s.prdy_vrss_vol_rate),
    foreign_buy: Number(s.frgn_ntby_qty) > 0
  }));

  // 🔥 자동 점수 계산 (핵심)
  mapped.forEach(s => {
    s.score = calculateScore(s);
  });

  renderList(mapped);
}

function renderList(list) {
  const el = document.getElementById('stockList');
  if (!el) return;

  el.innerHTML = list.map(s => `
    <div class="item">
      <div>${s.name}</div>
      <div>${s.price}</div>
      <div>⭐ ${s.score}</div>
    </div>
  `).join('');
}
</script>
