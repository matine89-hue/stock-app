<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>국장 스크리너</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14; --bg2: #13161e; --bg3: #1a1e28; --bg4: #222636;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
  --text: #e8eaf0; --text2: #8b90a0; --text3: #555a6e;
  --blue: #4a9eff; --green: #3dd68c; --red: #ff5c5c; --amber: #ffb84a;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; overflow-x: hidden; }
.app { max-width: 500px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

/* Header */
.header { padding: 16px; display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 18px; font-weight: 700; }
.logo span { color: var(--blue); }
.clock { font-family: 'JetBrains Mono'; font-size: 12px; color: var(--text2); }

/* Tabs */
.tabs-container { padding: 0 16px 12px; }
.tabs { display: flex; background: var(--bg3); padding: 4px; border-radius: var(--radius); gap: 4px; border: 1px solid var(--border); }
.tab { flex: 1; text-align: center; padding: 10px 0; font-size: 12px; border-radius: 7px; cursor: pointer; color: var(--text2); }
.tab.active { background: var(--bg4); color: var(--text); font-weight: 700; }

/* Content */
.content { flex: 1; padding: 0 16px 100px; }
.view-section { display: none; }
.view-section.active { display: block; }

/* Stock Card */
.stock-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; }
.card-main { padding: 16px; cursor: pointer; }
.card-top { display: flex; justify-content: space-between; margin-bottom: 6px; }
.card-bottom { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); }

/* Detail Panel */
.detail-panel { display: none; background: var(--bg3); padding: 16px; border-top: 1px solid var(--border2); }
.detail-panel.open { display: block; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
.grid-item { background: var(--bg4); padding: 8px; border-radius: 6px; text-align: center; }
.label { font-size: 9px; color: var(--text3); display: block; }
.val { font-family: 'JetBrains Mono'; font-weight: 700; font-size: 12px; }

/* Form & Buttons */
input, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); padding: 10px; margin-bottom: 8px; outline: none; }
button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; transition: 0.2s; }
.btn-blue { background: var(--blue); color: #fff; }
.btn-outline { background: transparent; border: 1px solid var(--blue); color: var(--blue); margin-top: 10px; }

/* Bottom Nav */
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: var(--bg2); display: flex; border-top: 1px solid var(--border); padding: 10px 0; z-index: 1000; }
.nav-item { flex: 1; text-align: center; color: var(--text3); font-size: 10px; cursor: pointer; }
.nav-item.active { color: var(--blue); }
.nav-icon { font-size: 20px; margin-bottom: 2px; }

.up { color: var(--red); } .dn { color: var(--blue); }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="logo">국장<span>스크리너</span></div>
    <div id="clock" class="clock">00:00:00</div>
  </div>

  <div class="tabs-container" id="topTabs">
    <div class="tabs">
      <div class="tab active" onclick="setSubView('KOSPI')">코스피</div>
      <div class="tab" onclick="setSubView('KOSDAQ')">코스닥</div>
      <div class="tab" onclick="setSubView('WATCH')">관심</div>
      <div class="tab" onclick="setSubView('HISTORY')">기록</div>
    </div>
  </div>

  <div class="content">
    <div id="section-list" class="view-section active">
      <div id="stockListContainer"></div>
    </div>

    <div id="section-settings" class="view-section">
      <div style="background:var(--bg2); padding:20px; border-radius:var(--radius); border:1px solid var(--border);">
