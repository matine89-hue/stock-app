<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>국장 스크리너</title>

<style>
body { font-family: Arial; margin:20px; background:#111; color:#fff; }
.item { padding:10px; border-bottom:1px solid #333; }
button { margin:5px; padding:8px 12px; }
input { padding:6px; margin:5px; width:200px; }
</style>
</head>

<body>

<h2>국장 스크리너</h2>

<div>
  <input id="appkey" placeholder="App Key">
  <input id="appsecret" placeholder="App Secret">
  <button onclick="getToken()">토큰 발급</button>
</div>

<div>
  <button onclick="loadStocks('KOSPI')">📊 코스피</button>
  <button onclick="loadStocks('KOSDAQ')">📈 코스닥</button>
</div>

<h3>종목 리스트</h3>
<div id="stockList"></div>

<script>
let token = '';
let appkey = '';
let appsecret = '';

/* ===================== 토큰 ===================== */
async function getToken() {
  appkey = document.getElementById('appkey').value;
  appsecret = document.getElementById('appsecret').value;

  const res = await fetch('/api/kis-proxy', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      action: 'getToken',
      appkey,
      appsecret
    })
  });

  const data = await res.json();
  console.log('토큰응답:', data);

  if (!data.access_token) {
    alert('토큰 발급 실패');
    return;
  }

  token = data.access_token;
  alert('토큰 발급 완료');
}

/* ===================== 점수 ===================== */
function calculateScore(s) {
  let score = 0;

  if (s.per && Number(s.per) < 10) score++;
  if (s.pbr && Number(s.pbr) < 1) score++;
  if (s.prdy_vrss_vol_rate && Number(s.prdy_vrss_vol_rate) > 150) score++;
  if (s.frgn_ntby_qty && Number(s.frgn_ntby_qty) > 0) score++;

  return score;
}

/* ===================== 종목 불러오기 ===================== */
async function loadStocks(market) {

  if (!token) {
    alert('토큰 먼저 발급');
    return;
  }

  const res = await fetch('/api/kis-proxy', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      action: 'volumeRank',
      market,
      token,
      appkey,
      appsecret
    })
  });

  const data = await res.json();
  console.log('API응답:', data);

  if (!data.output || data.output.length === 0) {
    alert('데이터 없음 (API 확인)');
    return;
  }

  let list = data.output;

  // 🔥 자동 점수 계산 (핵심)
  list.forEach(s => {
    s.score = calculateScore(s);
  });

  renderList(list);
}

/* ===================== 화면 출력 ===================== */
function renderList(list) {

  const el = document.getElementById('stockList');
  if (!el) return;

  el.innerHTML = list.map(s => `
    <div class="item">
      <b>${s.hts_kor_isnm || '-'}</b><br>
      가격: ${s.stck_prpr || '-'}<br>
      거래량: ${s.acml_vol || '-'}<br>
      PER: ${s.per || '-'} / PBR: ${s.pbr || '-'}<br>
      ⭐ 점수: ${s.score ?? 0}
    </div>
  `).join('');
}
</script>

</body>
</html>
