<script>
const PROXY_URL = '/api/kis-proxy';
let STOCKS_KOSPI = [], STOCKS_KOSDAQ = [];

// 1. 실시간 데이터 불러올 때 재무지표+점수까지 한꺼번에 처리
function fetchLiveData() {
  var t = localStorage.getItem('t'), ak = localStorage.getItem('ak'), as = localStorage.getItem('as');
  if (!t || !ak || !as) {
    alert('설정에서 API 정보를 먼저 입력하세요.');
    showSettings(); // 기존 UI 함수 호출
    return;
  }

  setFetchStatus('var(--amber)', '데이터 분석 및 점수 계산 중...');

  Promise.all([fetchVolumeRanking('KOSPI'), fetchVolumeRanking('KOSDAQ')])
    .then(function(results) {
      // 종목 리스트를 가져온 후, 각 종목별로 재무 데이터를 병렬로 즉시 호출
      var allStocks = results[0].concat(results[1]);
      var detailPromises = allStocks.slice(0, 20).map(function(s) {
        var code = s.mksc_shrn_iscd || s.stck_shrn_iscd;
        return fetchStockDetail(code).then(function(detail) {
          if (detail) {
            // 데이터 바인딩 (기존에 안나오던 지표들)
            s.pbr = detail.pbr || '0.00';
            s.per = detail.per || '0.00';
            s.roe = detail.roe || '0.00';
            s.eps = detail.eps || '0';
            s.bps = detail.bps || '0';
            s.sector = detail.bstp_nm || '일반'; // 회사소개 대용
            s.debt_ratio = detail.pbr > 0 ? "정상" : "체크필요"; // 부채비율 대용
            
            // 점수 계산 (종목 누를 때가 아니라 여기서 실행)
            s.score = calculateTotalScore(s); 
            // AI 분석도 미리 요청
            requestAIAnalysis(s); 
          }
          return s;
        });
      });

      return Promise.all(detailPromises);
    })
    .then(function(analyzedStocks) {
      // 결과 분류 및 화면 렌더링
      STOCKS_KOSPI = analyzedStocks.filter(s => s.market === 'KOSPI');
      STOCKS_KOSDAQ = analyzedStocks.filter(s => s.market === 'KOSDAQ');
      renderList();
      setFetchStatus('var(--green)', '✅ 분석 완료 (점수 및 재무 반영)');
    })
    .catch(function(e) {
      setFetchStatus('var(--red)', '오류 발생: ' + e.message);
    });
}

// 2. AI 판단 근거가 제대로 출력되도록 수정
function requestAIAnalysis(s) {
  var prompt = s.name + ' 종목 분석: PBR ' + s.pbr + ', ROE ' + s.roe + '%. 5일 이내 단기 투자 판단 근거를 3문장으로 설명.';

  fetch(PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'aiAnalysis', prompt: prompt })
  }).then(r => r.json())
  .then(data => {
    // Gemini API 응답 경로 수정
    var aiText = data.candidates && data.candidates[0] && data.candidates[0].content 
                 ? data.candidates[0].content.parts[0].text 
                 : '분석 데이터를 가져올 수 없습니다.';
    s.ai_reason = aiText;
    
    // UI에 즉시 반영 (ID 기반)
    var el = document.getElementById('ai-reason-' + (s.mksc_shrn_iscd || s.stck_shrn_iscd));
    if (el) el.innerText = aiText;
  });
}

// 3. 점수 계산 로직 (기존 함수 유지하되 s 객체 사용)
function calculateTotalScore(s) {
  var sc = 1;
  if (parseFloat(s.pbr) < 1.0 && parseFloat(s.pbr) > 0) sc += 1;
  if (parseFloat(s.roe) > 10) sc += 1;
  if (parseFloat(s.prdy_ctrt) > 0) sc += 1;
  return Math.min(sc, 5);
}
</script>
