<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>국장 스크리너 진단모드</title>
    <style>
        body { background:#0d0f14; color:#fff; font-family:sans-serif; margin:0; padding:20px; }
        .nav { display:flex; gap:10px; margin-bottom:20px; border-bottom:1px solid #333; padding-bottom:10px; }
        .nav-btn { flex:1; padding:15px; background:#222; border:1px solid #444; color:#fff; text-align:center; cursor:pointer; }
        .nav-btn.active { background:#4a9eff; border-color:#4a9eff; }
        .view { display:none; }
        .view.active { display:block; }
        .card { background:#1a1e28; padding:20px; border-radius:10px; border:1px solid #333; margin-bottom:10px; }
        input { width:100%; padding:15px; margin:10px 0; background:#000; color:#fff; border:1px solid #444; box-sizing:border-box; font-family:monospace; }
        button { width:100%; padding:15px; background:#4a9eff; color:#fff; border:none; font-weight:bold; cursor:pointer; font-size:16px; }
        pre { background:#000; padding:10px; overflow-x:auto; font-size:12px; border:1px solid #333; color:#0f0; }
    </style>
</head>
<body>

    <div class="nav">
        <div class="nav-btn active" id="m1" onclick="tab('set')">1. 설정 (키 입력)</div>
        <div class="nav-btn" id="m2" onclick="tab('list')">2. 종목 리스트</div>
    </div>

    <div id="v-set" class="view active">
        <div class="card">
            <h3 style="margin:0">🔑 한국투자증권 API 키 설정</h3>
            <p style="font-size:12px; color:#888;">* 반드시 '실전투자'용 키를 복사해서 붙여넣으세요.</p>
            <input type="text" id="ak" placeholder="App Key (복사-붙여넣기)">
            <input type="text" id="as" placeholder="App Secret (복사-붙여넣기)">
            <button onclick="getToken()">토큰 발급 테스트</button>
        </div>
        
        <div class="card">
            <h4 style="margin:0">📡 서버 응답 로그 (진단용)</h4>
            <pre id="log">대기 중...</pre>
        </div>
    </div>

    <div id="v-list" class="view">
        <button onclick="getStocks()" style="background:#333; border:1px solid #4a9eff;">📡 종목 데이터 가져오기</button>
        <div id="stockCont" style="margin-top:20px;"></div>
    </div>

    <script>
        function tab(t) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('v-'+t).classList.add('active');
            if(t === 'set') document.getElementById('m1').classList.add('active');
            else document.getElementById('m2').classList.add('active');
        }

        const log = (msg) => { document.getElementById('log').innerText = msg; };

        async function getToken() {
            const k = document.getElementById('ak').value.trim();
            const s = document.getElementById('as').value.trim();
            if(!k || !s) return alert("키를 입력하세요.");

            log("토큰 발급 시도 중...");
            try {
                const r = await fetch('/api/kis-proxy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'getToken', appkey: k, appsecret: s })
                });
                const d = await r.json();
                log(JSON.stringify(d, null, 2));

                if(d.access_token) {
                    localStorage.setItem('k', k); localStorage.setItem('s', s); localStorage.setItem('t', d.access_token);
                    alert("✅ 토큰 발급 성공! 다음 단계로 가세요.");
                    tab('list');
                } else {
                    alert("❌ 토큰 발급 실패. 로그를 확인하세요.");
                }
            } catch(e) { log("에러: " + e.message); }
        }

        async function getStocks() {
            const t = localStorage.getItem('t'), k = localStorage.getItem('k'), s = localStorage.getItem('s');
            if(!t) return alert("설정에서 토큰부터 받으세요.");

            const cont = document.getElementById('stockCont');
            cont.innerHTML = "데이터 로딩 중...";
            try {
                const r = await fetch('/api/kis-proxy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'volumeRank', market: 'KOSPI', token: t, appkey: k, appsecret: s })
                });
                const d = await r.json();
                const list = d.output || d.output1;

                if(list && Array.isArray(list) && list.length > 0) {
                    cont.innerHTML = list.map(i => `
                        <div class="card">
                            <b>${i.hts_kor_isnm}</b> (${i.mksc_shrn_iscd})<br>
                            <span style="color:#4a9eff">${parseInt(i.stck_prpr).toLocaleString()}원</span> | ${i.prdy_ctrt}%
                        </div>
                    `).join('');
                } else {
                    cont.innerHTML = `<div class="card" style="color:#ff5c5c">데이터가 없습니다.<br>사유: ${d.msg1 || '확인불가'}</div>`;
                    console.log("전체 응답:", d);
                }
            } catch(e) { cont.innerHTML = "통신 에러: " + e.message; }
        }

        // 저장된 키 불러오기
        document.getElementById('ak').value = localStorage.getItem('k') || '';
        document.getElementById('as').value = localStorage.getItem('s') || '';
    </script>
</body>
</html>
