<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>국장 스크리너</title>

<style>
body { font-family: Arial; margin:20px; }
.item { padding:10px; border-bottom:1px solid #ddd; }
button { margin:5px; }
</style>
</head>

<body>

<h2>국장 스크리너</h2>

<div>
  <input id="appkey" placeholder="App Key">
  <input id="appsecret" placeholder="App Secret">
  <button onclick="getToken()">토큰발급</button>
</div>

<div>
  <button onclick="loadStocks('KOSPI')">코스피</button>
  <button onclick="loadStocks('KOSDAQ')">코스닥</button>
</div>

<h3>종목 리스트</h3>
<div id="stockList"></div>

<script>
let token = '';
let appkey = '';
let appsecret = '';

async function getToken() {
  appkey = document.getElementById('appkey').value;
  appsecret = document.getElementById('appsecret').value;

  const res = await fetch('/api/kis-proxy', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: 'getToken',
      appkey,
      appsecret
    })
  });

  const data = await res.json();
  token = data.access_token;

  alert('토큰 발급 완료');
}

function calculateScore(s) {
  let score = 0;

  if (s.per && s.per < 10) score++;
  if (s.pbr && s.pbr < 1) score++;
  if (s.prdy_vrss_vol_rate && s.prdy_vrss_vol_rate > 150) score++;
  if (s.frgn_ntby_qty && Number(s.frgn_ntby_qty) > 0) score++;

  return score;
}

async function loadStocks(market) {

  const res = await fetch('/api/kis-proxy', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      action: 'volumeRank',
      market,
      token,
      appkey,
      appsecret
    })
  });

  const data = await res.json();
  console.log('API응답:', data);

  const list = data.output || [];

  // 🔥 자동 점수 계산
  list.forEach(s => {
    s.score = calculateScore(s);
  });

  renderList(list);
}

function renderList(list) {

  const el = document.getElementById('stockList');

  el.innerHTML = list.map(s => `
    <div class="item">
      <b>${s.hts_kor_isnm}</b><br>
      가격: ${s.stck_prpr}<br>
      거래량: ${s.acml_vol}<br>
      ⭐ 점수: ${s.score}
    </div>
  `).join('');
}

</script>

</body>
</html>
