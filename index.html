<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>국장 스크리너</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14; --bg2: #13161e; --bg3: #1a1e28; --bg4: #222636;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
  --text: #e8eaf0; --text2: #8b90a0; --text3: #555a6e;
  --blue: #4a9eff; --blue-dim: rgba(74,158,255,0.12);
  --green: #3dd68c; --green-dim: rgba(61,214,140,0.12);
  --red: #ff5c5c; --red-dim: rgba(255,92,92,0.12);
  --amber: #ffb84a; --amber-dim: rgba(255,184,74,0.12);
  --purple: #a78bfa; --purple-dim: rgba(167,139,250,0.12);
  --radius: 10px; --radius-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; overflow-x: hidden; }
.mono { font-family: 'JetBrains Mono', monospace; }
.app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; position: relative; }
@media(min-width: 900px) { .app { max-width: 900px; } }

/* Header & UI */
.header { padding: 16px 16px 0; display: flex; align-items: center; justify-content: space-between; }
.logo { font-size: 18px; font-weight: 700; }
.logo span { color: var(--blue); }
.time-badge { font-size: 11px; color: var(--text2); background: var(--bg3); padding: 4px 10px; border-radius: 99px; border: 0.5px solid var(--border2); }
.market-bar { margin: 12px 16px 0; background: var(--bg3); border-radius: var(--radius); padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; border: 0.5px solid var(--border); }

/* Tabs */
.tabs-wrap { padding: 14px 16px 0; }
.tabs { display: flex; gap: 6px; background: var(--bg3); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 4px; }
.tab { flex: 1; text-align: center; padding: 8px 4px; font-size: 12px; font-weight: 500; border-radius: 7px; cursor: pointer; color: var(--text2); transition: all 0.2s; }
.tab.active { background: var(--bg4); color: var(--text); border: 0.5px solid var(--border2); }

/* Stock List & Detail Card */
.stock-list { padding: 10px 16px; flex: 1; }
.stock-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; transition: transform 0.1s; }
.card-content { padding: 14px; cursor: pointer; }
.stock-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.sname { font-weight: 700; font-size: 15px; }
.price-main { font-family: 'JetBrains Mono'; font-weight: 700; font-size: 15px; }
.up { color: var(--red); } .dn { color: var(--blue); }

/* Detailed Stats Section */
.detail-expand { display: none; background: var(--bg3); padding: 14px; border-top: 0.5px solid var(--border2); }
.detail-expand.active { display: block; }
.metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 12px; }
.metric-box { background: var(--bg4); padding: 8px 4px; border-radius: var(--radius-sm); text-align: center; }
.m-label { font-size: 9px; color: var(--text3); display: block; margin-bottom: 2px; }
.m-val { font-weight: 700; color: var(--text); font-size: 11px; }

/* Score & Memo Form */
.record-form { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
input, textarea { width: 100%; background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); padding: 8px; font-size: 13px; outline: none; }
.btn-group { display: flex; gap: 6px; margin-top: 5px; }
.btn-sm { flex: 1; padding: 8px; font-size: 12px; border-radius: var(--radius-sm); cursor: pointer; border: none; font-weight: 600; }

/* Bottom Nav */
.bottom-nav { position: sticky; bottom: 0; background: var(--bg2); border-top: 0.5px solid var(--border); display: flex; padding: 8px 0; z-index: 100; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; color: var(--text3); font-size: 10px; }
.nav-item.active { color: var(--blue); }
.nav-icon { font-size: 18px; }

/* Settings View */
#settingsView { padding: 16px; display: none; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">국장<span>스크리너</span></div>
    <div class="time-badge" id="clock">--:--</div>
  </div>

  <div class="market-bar">
    <div style="font-size:11px; color:var(--text2);">● 실시간 연결 상태</div>
    <div id="marketIndices" style="font-size:11px; font-family:'JetBrains Mono';">연결 필요</div>
  </div>

  <div class="tabs-wrap" id="mainTabs">
    <div class="tabs">
      <div class="tab active" onclick="switchTab(0)">📊 코스피</div>
      <div class="tab" onclick="switchTab(1)">📈 코스닥</div>
      <div class="tab" onclick="switchTab(2)">⭐ 관심</div>
      <div class="tab" onclick="switchTab(3)">📋 점수기록</div>
    </div>
  </div>

  <div id="listView" class="stock-list"></div>

  <div id="settingsView">
    <div style="background:var(--bg2); padding:16px; border-radius:var(--radius); border:0.5px solid var(--border);">
      <h4 style="margin-bottom:12px; font-size:14px; color:var(--blue);">KIS API 실시간 연결</h4>
      <input id="inputAppKey
